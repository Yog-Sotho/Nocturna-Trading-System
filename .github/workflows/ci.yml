# FILE LOCATION: .github/workflows/ci.yml
name: Nocturna CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit mypy

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Bandit security scan
        run: bandit -r src/ -c pyproject.toml --severity-level medium -f json || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          FLASK_ENV: testing
          FLASK_SECRET_KEY: ci-test-secret-key-not-for-production-use-1234567890
          REDIS_URL: redis://localhost:6379/0
          TRADING_MODE: PAPER
        run: |
          pytest src/tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=40
